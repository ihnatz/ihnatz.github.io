---
layout: default
---

<header class="site-header">
  <h1>Ihnat Zakreuski</h1>
  <p class="contact-links">
    <a href="mailto:iezakrevsky@gmail.com">email</a> ·
    <a href="https://github.com/ihnatz">github</a> ·
    <a href="https://www.linkedin.com/in/ihnatz">linkedin</a>
  </p>
</header>

<ul class="post-list">
  {% assign posts = site.posts | where_exp: "post", "post.draft != true" %}
  {% for post in posts %}
    <li class="post-item">
      <a href="{{ post.url | prepend: site.baseurl }}">{{ post.title }}</a>
      <time>{{ post.date | date: "%Y %b %-d" }}</time>
    </li>
  {% endfor %}
</ul>
